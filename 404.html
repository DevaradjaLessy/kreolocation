<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/images/logo.png" />
  <meta name="robots" content="noindex" />
  <title>Page introuvable – KreoLocation 🇷🇪</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --green-deep:  #1B3A2D;
      --green-mid:   #2D6A4F;
      --green-sage:  #52796F;
      --green-pale:  #EEF5EC;
      --off-white:   #F8F6F2;
      --text-secondary: #5A5A56;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito Sans', system-ui, sans-serif;
      background: var(--off-white);
      color: var(--text-secondary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .box { max-width: 480px; }
    .code {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(5rem, 18vw, 8rem);
      font-weight: 600;
      line-height: 1;
      color: var(--green-deep);
    }
    .code em { font-style: italic; font-weight: 400; color: var(--green-sage); }
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 600;
      color: var(--green-deep);
      margin: 12px 0 10px;
    }
    p { font-size: 0.95rem; line-height: 1.7; margin-bottom: 28px; }
    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 0.875rem;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 8px;
      transition: background 0.25s ease, transform 0.25s ease;
    }
    .btn-primary {
      background: var(--green-mid);
      color: #fff;
      box-shadow: 0 4px 16px rgba(45,106,79,0.3);
    }
    .btn-primary:hover { background: var(--green-deep); transform: translateY(-2px); }
    .btn-outline {
      background: transparent;
      color: var(--green-mid);
      border: 1.5px solid var(--green-mid);
    }
    .btn-outline:hover { background: var(--green-pale); transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">4<em>0</em>4</div>
    <h1>Oups, out chemin lé perdu&nbsp;!</h1>
    <p>Cette page n'existe pas ou a été déplacée. Pas de panique — retrouvez la route en un clic.</p>
    <div class="actions">
      <a href="/" class="btn btn-primary">Retour à l'accueil</a>
      <a href="/conciergerie.html" class="btn btn-outline">Découvrir la conciergerie</a>
    </div>
  </div>
</body>
</html>
